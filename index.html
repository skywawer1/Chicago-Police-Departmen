<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chicago PD - Database Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Новые стили для экрана блокировки гражданских */
        .lock-screen-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: #030712;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .lock-box {
            background: #0b1329;
            border: 2px solid #ef4444;
            border-radius: 8px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }
        .lock-icon {
            font-size: 60px;
            color: #ef4444;
            margin-bottom: 20px;
        }
        .lock-title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ef4444;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .lock-subtitle {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .lock-text {
            font-size: 15px;
            line-height: 1.6;
            color: #e5e7eb;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-left: 4px solid #ef4444;
            text-align: left;
        }

        /* Стили для поиска и базы законов */
        .search-box {
            margin-bottom: 20px;
            width: 100%;
        }
        .laws-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .law-card {
            background: #0b1329;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 18px;
            transition: 0.2s;
        }
        .law-card:hover {
            border-color: #3b82f6;
            background: #0f1c3f;
        }
        .law-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .law-code {
            background: #ef4444;
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            font-family: monospace;
        }
        .law-code.ac {
            background: #10b981;
        }
        .law-title {
            margin: 0;
            font-size: 16px;
            color: #3b82f6;
            font-weight: bold;
        }
        .law-desc {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="modal-view" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <img src="logo.png" alt="CPD Badge" class="auth-logo" id="main-auth-logo">
            <h2>CPD DATABASE</h2>
            <p class="auth-sub">CHICAGO POLICE DEPARTMENT</p>
            <input type="email" id="auth-email" placeholder="Email (user@cpd.gov)">
            <input type="password" id="auth-password" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="btn-login" class="btn-primary">Войти</button>
                <button id="btn-register" class="btn-secondary">Регистрация</button>
            </div>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <aside id="sidebar-el" class="sidebar">
            <div class="sidebar-header">
                <img src="logo.png" alt="Logo" class="side-logo">
                <div>
                    <h1>CHICAGO PD</h1>
                    <p>DATABASE TERMINAL</p>
                </div>
            </div>

            <nav id="sidebar-nav"></nav>

            <div class="sidebar-bottom-brand">
                <img src="logo.png" alt="CPD Division" class="brand-img">
                <button id="btn-logout" class="btn-logout-small">ВЫХОД ИЗ СИСТЕМЫ</button>
            </div>
        </aside>

        <main class="content">
            <header id="topbar-el" class="topbar">
                <div class="topbar-left">
                    <div class="info-block clickable" id="unit-edit">
                        <span class="label">MARKING</span>
                        <span id="disp-unit" class="value">---</span>
                    </div>
                    <div class="info-block clickable" id="name-edit">
                        <span class="label">CALLSIGN</span>
                        <span id="disp-name" class="value">---</span>
                    </div>
                    <div class="info-block clickable" id="status-toggle">
                        <span class="label">STATUS</span>
                        <span id="disp-status" class="value status-badge">OFF DUTY</span>
                    </div>
                    <div class="info-block">
                        <span class="label">RANK / DIVISION</span>
                        <span id="disp-rank-div" class="value">USER / UNASSIGNED</span>
                    </div>
                </div>
                <div class="topbar-right">
                    <button id="btn-switch-bureau" class="btn-bureau" style="display: none;">DETECTIVE BUREAU ⮂</button>
                </div>
            </header>

            <div id="tab-container" class="tab-main"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
